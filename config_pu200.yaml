train_data_dir: ./data/pu200_t3/train
val_data_dir: ./data/pu200_t3/val

train_subset: null
val_subset: null

debug: true

model: transformer

hidden_dim: 256
num_layers: 6      
nhead: 8        
latent_dim: 128     
dropout: 0.1
dr_threshold: 0.4
max_neighbors: 64

learning_rate: 0.0001  
weight_decay: 0.0001   
epochs: 100
num_workers: 4

scheduler_gamma: 0.5
scheduler_milestones: [100, 200]

early_stopping_patience: 15

gradient_clip_val: 1.0
gradient_clip_algorithm: norm
accumulate_grad_batches: 4
check_val_every_n_epoch: 5
precision: 16

oc_q_min: 0.1
oc_s_B: 1.0
oc_repulsive_chunk_size: 16

loss_weight_attractive: 1.0
loss_weight_repulsive: 1.0
loss_weight_beta: 1.0

output_dir: ./output
save_every: 5
resume: null

seed: 42
num_cpu_threads: 64
gpus: [1]

dbscan_min_samples: 2
beta_threshold: 0.005

purity_threshold: 0.75
eta_cut: null

pt_bins_start: 0.8
pt_bins_end: 2.0
pt_bins_count: 50
eta_bins_start: -2.5
eta_bins_end: 2.5
eta_bins_count: 50